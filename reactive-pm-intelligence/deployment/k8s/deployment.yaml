apiVersion: apps/v1
kind: Deployment
metadata:
  name: reactive-pm-intelligence
spec:
  replicas: 2
  selector:
    matchLabels:
      app: reactive-pm-intelligence
  template:
    metadata:
      labels:
        app: reactive-pm-intelligence
    spec:
      containers:
        - name: backend
          image: reactive-pm-intelligence-backend:latest
          ports:
            - containerPort: 8000
          env:
            - name: ENVIRONMENT
              value: production
            - name: DATABASE_URL
              value: postgresql://reactivepm:change-me@postgres/reactivepm